# Site Settings
title: "SOFIE GSoC '26 Logbook"
description: "ML Inference on heterogeneous architectures using SOFIE"
url: "https://mmadan128.github.io"
baseurl: "/SOFIE-GSoC-26" 
repository: "mmadan128/SOFIE-GSoC-26"

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark" # The dark mode you requested

# Performance & Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-gist # Useful for the code samples Sanjiban requested

# Defaults for Posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
