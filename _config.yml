title: "Logbook"
description: "ML Inference on heterogeneous architectures using SOFIE"
url: "https://mmadan128.github.io"
baseurl: "/SOFIE-GSoC-26"
repository: "mmadan128/SOFIE-GSoC-26"

remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

mathjax: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-gist

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: false

author:
  name: "Mohit Madan"
